<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNC Tracker — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <span class="navbar-brand">⏱ TNC Tracker</span>
            <div class="navbar-user">
                <div class="user-badge">
                    <div class="user-avatar" id="user-avatar-initial">T</div>
                    <span id="username-display">User</span>
                </div>
                <button class="btn btn-sm btn-secondary" id="logout-btn"
                    style="width:auto; margin-top:0;">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- Stats -->
        <div class="stats-grid animate-fade-in" style="animation-delay:0.05s;">
            <div class="stat-card">
                <div class="stat-label">Today</div>
                <div class="stat-value electric" id="stat-today">0h</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">This Week</div>
                <div class="stat-value accent" id="stat-week">0h</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">OT This Week</div>
                <div class="stat-value warning" id="stat-ot">0h</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Tasks</div>
                <div class="stat-value success" id="stat-active">0</div>
            </div>
        </div>

        <!-- Weekly Calendar -->
        <div class="calendar-section panel animate-fade-in" style="animation-delay:0.1s;">
            <div class="calendar-header">
                <h3>Weekly View</h3>
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <span id="week-label" style="font-size:0.82rem; color:var(--text-3);"></span>
                    <div class="calendar-nav">
                        <button class="calendar-nav-btn" id="prev-week">‹</button>
                        <button class="calendar-nav-btn" id="today-btn">Today</button>
                        <button class="calendar-nav-btn" id="next-week">›</button>
                    </div>
                </div>
            </div>
            <div class="week-grid" id="week-grid"></div>
        </div>

        <!-- Add Task -->
        <div class="add-task-panel animate-fade-in" style="animation-delay:0.15s;">
            <button class="add-task-toggle" id="toggle-task-form">
                + Add New Task
            </button>
            <div class="panel hidden animate-slide-in" id="add-task-form-wrapper" style="margin-top:0.75rem;">
                <h3 style="margin-bottom:1rem;">New Task</h3>
                <form id="add-task-form">
                    <div class="form-group">
                        <label for="task-title">Task Title</label>
                        <input type="text" id="task-title" required placeholder="What are you working on?" />
                    </div>
                    <div class="form-group">
                        <label for="task-desc">Description (optional)</label>
                        <textarea id="task-desc" rows="2" placeholder="Brief description..."
                            style="resize:vertical;"></textarea>
                    </div>
                    <div style="display:flex; gap:0.75rem;">
                        <button type="submit" class="btn btn-electric" style="flex:1;">Create Task</button>
                        <button type="button" class="btn btn-secondary" style="flex:1; margin-top:0;"
                            id="cancel-task-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Task List -->
        <div class="animate-fade-in" style="animation-delay:0.2s;">
            <div class="section-header">
                <span class="section-title">Tasks</span>
                <span class="section-count" id="task-count">0</span>
            </div>
            <div id="task-list" class="task-list">
                <div style="text-align:center; padding: 2rem; color: var(--text-3);">Loading your tasks...</div>
            </div>
        </div>

        <!-- Log Time Modal (hidden by default) -->
        <div id="log-time-overlay" class="hidden" style="
      position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
      z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem;">
            <div class="panel animate-slide-in"
                style="width:100%; max-width:420px; background:var(--surface-1); border-radius:var(--radius-lg);">
                <h3 style="margin-bottom:1.25rem;">Log Time</h3>
                <form id="log-time-form">
                    <div class="form-group">
                        <label>Task</label>
                        <div id="log-task-name" style="font-weight:600; color:var(--accent-light);"></div>
                    </div>
                    <div class="form-group">
                        <label for="log-hours">Hours</label>
                        <input type="number" id="log-hours" step="0.25" min="0.25" max="24" placeholder="e.g. 1.5"
                            required />
                    </div>
                    <div class="form-group">
                        <label for="log-date">Date</label>
                        <input type="date" id="log-date" required />
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <div class="ot-toggle">
                            <button type="button" class="ot-btn active-regular" id="btn-regular">Regular</button>
                            <button type="button" class="ot-btn" id="btn-ot">Overtime</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                        <button type="submit" class="btn btn-electric" style="flex:1;">Save</button>
                        <button type="button" class="btn btn-secondary" style="flex:1; margin-top:0;"
                            id="cancel-log-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
    <script type="module" src="/dashboard.js"></script>
</body>

</html>
