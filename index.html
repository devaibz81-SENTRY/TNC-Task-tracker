<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker & OT | Login</title>
  <!-- Modern Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="centered-container">
    <div class="card animate-fade-in">
      <h1 class="text-center">Task Tracker</h1>
      <p class="text-center text-muted mb-1" id="form-subtitle">Login to your sandbox</p>

      <form id="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Enter username" />
        </div>

        <div class="form-group">
          <label for="pin">4-Digit PIN</label>
          <input type="text" id="pin" name="pin" required maxlength="4" inputmode="numeric" pattern="\d{4}"
            placeholder="0000" />
        </div>

        <!-- Registration only field: Admin Checkbox -->
        <div class="form-group hidden" id="admin-group">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="isAdmin" name="isAdmin" style="width: auto;">
            Register as Admin User
          </label>
        </div>

        <button type="submit" class="btn" id="submit-btn">Login</button>
        <button type="button" class="btn btn-secondary" id="toggle-auth">Need an account? Sign Up</button>
      </form>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
