<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNC Tracker — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <span class="navbar-brand">⏱ TNC Tracker — Admin</span>
            <div class="navbar-user">
                <div class="user-badge">
                    <div class="user-avatar" id="user-avatar-initial">A</div>
                    <span id="username-display">Admin</span>
                </div>
                <button class="btn btn-sm btn-secondary" id="dashboard-link" style="width:auto; margin-top:0;">My
                    Dashboard</button>
                <button class="btn btn-sm btn-danger" id="logout-btn" style="width:auto; margin-top:0;">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container animate-fade-in">

        <!-- Stats Row -->
        <div class="stats-grid" style="margin-bottom:1.5rem;">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value accent" id="stat-users">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Platform Hours</div>
                <div class="stat-value electric" id="stat-hours">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total OT Hours</div>
                <div class="stat-value warning" id="stat-ot">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tasks Completed</div>
                <div class="stat-value success" id="stat-done">—</div>
            </div>
        </div>

        <!-- Export Controls -->
        <div class="panel"
            style="margin-bottom:1.25rem; display:flex; flex-wrap:wrap; align-items:center; gap:1.25rem; justify-content:space-between;">
            <div>
                <h3 style="margin-bottom:0.25rem;">Export Report</h3>
                <p style="font-size:0.82rem; color:var(--text-3);">Download a CSV with your team's activity data.</p>
            </div>
            <div style="display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
                <select id="export-filter" style="width:auto; padding:0.55rem 0.85rem;">
                    <option value="all">All (Aggregated)</option>
                    <option value="tasks_only">Tasks Only</option>
                    <option value="time_only">Time Entries Only</option>
                </select>
                <button id="export-btn" class="btn btn-electric" style="width:auto;">↓ Download CSV</button>
            </div>
        </div>

        <!-- User Table -->
        <div class="panel" style="padding:0; overflow:hidden;">
            <div
                style="padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
                <h3>All Users</h3>
                <span class="section-count" id="user-count">0</span>
            </div>
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Tasks</th>
                            <th>Done</th>
                            <th>Regular Hrs</th>
                            <th>OT Hrs</th>
                            <th>Total Hrs</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <tr>
                            <td colspan="7" class="text-center text-muted" style="padding:2rem;">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
    <script type="module" src="/admin.js"></script>
</body>

</html>
